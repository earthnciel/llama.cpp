; llama-server model presets — router mode (--models-preset).
; Section name MUST match the HF repo:quant id used to populate the cache
; (i.e. what you would pass to '-hf'). The router maps incoming requests'
; "model" field to these sections.
;
; Reserved/router-managed args are auto-stripped: model, mmproj, alias,
; hf-repo, host, port, api-key, models-dir/max/preset/autoload.
;
; Precedence: command-line > [section] > [*]

version = 1

; ----------------------------------------------------------------------
; Global defaults — every model inherits these unless overridden below
; ----------------------------------------------------------------------
[*]
; --- offload / runtime ---
n-gpu-layers      = 999
fit               = off
no-mmap           = true
np                = 1
fa                = on
t                 = 9
b                 = 2048
ub                = 1024
ctx-size          = 65536
cache-ram         = 4096
no-mmproj         = true
cache-type-k      = q8_0
cache-type-v      = q8_0

; --- chat / agent behavior ---
; Reasoning is OFF for all models. HARD off: reasoning-budget=0 force-ends any
; thinking immediately, so even a client sending enable_thinking:true cannot
; start a reasoning loop. Disabled after an in-practice infinite reasoning loop
; (2026-06-22); sampling-side mitigations (temp/DRY/budget cap) did not hold.
; To re-enable: reasoning=auto + reasoning-budget=<N> (see git history for the
; per-request client controls and the thinking-coder sampling profile).
jinja             = true
reasoning         = off
reasoning-budget  = 0

; --- sampling (non-thinking agentic-coding profile; reasoning OFF) ---
; Vendor anchor = Qwen3 instruct/non-thinking rec: top-k 20, top-p 0.8 (tighter
; tail than thinking's 0.95 -> more reliable tool-calls / diffs). Temp kept low
; (0.3) for code precision but OFF greedy — Qwen warns greedy -> repetition even
; non-thinking. (Determinism camp uses 0.0-0.2; 0.7 is Qwen's general-chat value.)
; Penalties left clean (1.0 / 0.0): non-thinking models aren't looping here, and
; repeat-penalty harms code. If repetition ever appears, the cheap insurance is
; repeat-penalty 1.05 + repeat-last-n 256 (per llama.cpp coding guides).
temp              = 0.3        ; (was 0.2) off-greedy, still precise for code
top-k             = 20         ; (was 40) Qwen3 non-thinking rec
top-p             = 0.8        ; (was 0.95) Qwen3 non-thinking rec — trims derailing tail
min-p             = 0.00
repeat-penalty    = 1.0
presence-penalty  = 0.0

stop-timeout      = 45

; ----------------------------------------------------------------------
; Qwen3.6 35B-A3B (MAIN CODER — official Qwen, replaces Nex-N2-mini 2026-06-22).
; unsloth UD-Q4_K_XL 22.4 GB. qwen35moe arch — same family Nex was derived from
; (Nex was 22.49 GiB Q5_K_S, so this is ~the same footprint). Same unsloth UD
; convention as the Gemma / GLM sections.
; NOTE: the old "non-QAT >= Q5_K_S" quant floor was RETRACTED 2026-06-22; Q4 is
;       now allowed here per user decision (smaller footprint over a ~4GB quality
;       margin vs the previous UD-Q5_K_XL 26.6 GB).
;
; Mode: vision OFF (no-mmproj) + reasoning OFF (global hard-off + TEMPLATE hard-off).
;       Direct text-completion / agentic coder.
;
; ⚠️ REASONING — why a custom template (2026-07-06): the stock GGUF template
;   FORCE-OPENS '<think>\n' in the generation prompt unless enable_thinking arrives
;   as the exact boolean false. A client that omits the kwarg, sends the STRING
;   "false", or sends true re-opens reasoning — so global reasoning=off /
;   reasoning-budget=0 did NOT hold (observed: model still entered thinking). The
;   chat-template-file below removes that branch and ALWAYS emits a pre-closed empty
;   '<think>\n\n</think>' block, so no request can start a reasoning loop regardless
;   of enable_thinking type/value. Verified via offline render (A/B/C/D + tools).
;   Revert to vendor behavior = delete the chat-template-file line.
;
; ⚠️ NOT YET BENCHED on this hardware — section reflects the user's current tuning:
;   - 22.4 GB full-load fits 32 GB RAM more comfortably than the old Q5 (26.6 GB),
;     so the no-mmap override was dropped (inherits global no-mmap=true=full load).
;   - n-cpu-moe 26 (user-set). Tune toward best tg while keeping 64K VRAM headroom;
;     verify a clean VRAM state first (manual b580top check).
; ----------------------------------------------------------------------
[qwen3.6-35b-a3b]
hf                 = unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_XL
n-cpu-moe          = 23
load-on-startup    = false
chat-template-file = /opt/llm/llama.cpp/chat-templates/qwen3.6-35b-a3b-nothink.jinja

; ----------------------------------------------------------------------
; Qwen3.6 35B-A3B — THINKING/REASONING variant (SAME GGUF as [qwen3.6-35b-a3b],
; reasoning ENABLED). Select it from a client with model="qwen3.6-35b-a3b-thinking".
; Differs from the non-thinking section ONLY in reasoning + sampling:
;   - NO chat-template-file  -> uses the stock GGUF template (which opens <think>),
;     so reasoning actually runs (the non-thinking section's custom template would
;     force it closed).
;   - reasoning=auto + reasoning-budget=-1 override the global hard-off (reasoning=off,
;     budget=0). auto = thinking on by default, but a client may still send
;     enable_thinking:false to suppress it per-request.
;   - Qwen3.6 thinking-mode coding sampling: temp 0.6 / top-p 0.95 (vs non-think
;     0.3 / 0.8). top-k 20 / min-p / penalties inherit the global profile.
; ⚠️ Same 22.4 GB weights as the non-thinking section but loaded as a SEPARATE
;    context — both cannot be resident at once (router swaps on demand; expect a
;    reload when switching between the two).
; ⚠️ The stock template force-opens <think>; an in-practice infinite-reasoning loop
;    (2026-06-22) is exactly why the MAIN section is hard-off. If loops recur here,
;    cap the budget (e.g. reasoning-budget=8192) instead of -1.
; ----------------------------------------------------------------------
[qwen3.6-35b-a3b-thinking]
hf                = unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_XL
n-cpu-moe         = 23
load-on-startup   = false
reasoning         = auto
reasoning-budget  = -1
temp              = 0.6
top-p             = 0.95

; ----------------------------------------------------------------------
; Gemma 4 12B QAT (text-only mode — thinking/reasoning + multimodal OFF).
; Google QAT repackaged by unsloth as UD-Q4_K_XL. 6.5GB.
; Dense model (no MoE offload). 48 layers (40 sliding + 8 full-attn).
; Native ctx 256K (long ctx cheap via sliding window).
;
; Mode: vision OFF (no-mmproj=true) + reasoning OFF (global hard-off).
; Use as a fast text coder/responder (small + dense → highest tg in lineup).
;
; Tensor placement (b9716, ngl 999):
;   SYCL0 model  6390 MiB + SYCL_Host model 540 MiB (token-embedding
;     lookup tensor — backend forces it to host; ~0% compute impact)
;   SYCL0 KV     1024 + 640 MiB (8 full-attn 64K + 40 SWA window 1024)
;   fdinfo VRAM ~8.6 GiB / 12 GiB at idle (headroom 3.5 GB)
;   All 49/49 layers + output on GPU. 540 MiB host placement is SYCL
;   backend behavior, not reducible via --no-mmap or other flags.
;
; Bench (SYCL b9716, ctx 64K verified, -r 2):
;   ub 1024 (this): pp 1058 / tg 43.83 @ d=0,  pp 141 / tg 28.68 @ d=64K
;   ub 2048/4096: identical perf (dense compute-bound, ub size irrelevant).
; ----------------------------------------------------------------------
[gemma-4-12b]
hf                = unsloth/gemma-4-12B-it-qat-GGUF:UD-Q4_K_XL
ctx-size          = 131072
no-mmap           = false
no-mmproj         = false
spec-type         = draft-mtp
spec-draft-n-max  = 4
load-on-startup   = false
; Gemma 4 vendor sampling — overrides the global Qwen-tuned non-thinking profile.
; Google rec = temp 1.0 / top-k 64 / top-p 0.95; unsloth reports LOW temp (0.3/0.6/0.8)
; DEGRADES Gemma 4 even for coding, so the inherited temp 0.3 / top-k 20 / top-p 0.8
; was actively hurting quality here. (min-p/penalties still inherit global.)
temp              = 1.0
top-k             = 64
top-p             = 0.95
; Client-controllable reasoning: default stays OFF (inherits global reasoning=off),
; but lift the budget cap so a client that sends enable_thinking:true ACTUALLY runs
; (global reasoning-budget=0 would force-end it immediately). Omitted or
; enable_thinking:false => still OFF. NOT auto (auto would flip the default to ON).
; ⚠️ Gemma 4 thinking-ON is itself buggy upstream (#21338 <unused49> flood, #24170
;    fails to start), so client-enabled reasoning may not work reliably.
reasoning-budget  = -1

; ----------------------------------------------------------------------
; Gemma 4 26B-A4B QAT (text-only mode — thinking/reasoning + multimodal OFF).
; Google QAT repackaged by unsloth as UD-Q4_K_XL. 13.3GB.
; 30 layers (25 sliding window=1024 + 5 full attention).
;
; Mode: vision OFF (no-mmproj=true) + reasoning OFF (global hard-off).
; Used as a text-only secondary coder/advisor — for vision use Gemma 12B QAT.
;
; Bench (SYCL b9716, ctx 64K verified, clean VRAM state):
;   ncmoe 12 + f16 KV (this): pp 489 / tg 34.57 @ d=0,
;                             pp 135 / tg 22.86 @ d=64K  ✅ 64K guaranteed
;   ncmoe 11: d=0 OK (507/36) but OOM at d=64K — true floor is 12
;   ncmoe 13/14: progressively slower (more CPU offload than needed)
;   ncmoe 18 (old, over-conservative): pp 405/tg 30.63 @ d=0, pp 128/tg 21.11 @ d=64K
;     → ncmoe 12 is +20% pp / +13% tg vs ncmoe 18 at d=0.
;
; KV cache = f16 (SYCL FA q-KV path is 2-4x slower at depth).
; ----------------------------------------------------------------------
[gemma-4-26b-a4b]
hf                = unsloth/gemma-4-26B-A4B-it-qat-GGUF:UD-Q4_K_XL
n-cpu-moe         = 10
spec-type         = draft-mtp
spec-draft-n-max  = 4
load-on-startup   = false
; Gemma 4 vendor sampling — see [gemma-4-12b] note. temp 1.0 / top-k 64 / top-p 0.95;
; low temp degrades Gemma 4 (unsloth). Overrides global Qwen-tuned non-thinking profile.
temp              = 1.0
top-k             = 64
top-p             = 0.95
; Client-controllable reasoning — see [gemma-4-12b] note. Default OFF (global
; reasoning=off) + budget cap lifted (=-1) so a client can enable per-request.
reasoning-budget  = -1

; ----------------------------------------------------------------------
; EmbeddingGemma 300M (multilingual text embedder, 100+ languages).
; CPU only (n-gpu-layers = 0) — 0 VRAM use, coexists with any LLM.
; ~400MB RAM. Always loaded for RAG. Routes /v1/embeddings here.
; ----------------------------------------------------------------------
[embeddinggemma-300m]
hf                = ggml-org/embeddinggemma-300M-GGUF:Q8_0
n-gpu-layers      = 0
embedding         = true
pooling           = mean
ctx-size          = 2048
ub                = 2048
b                 = 2048
no-mmproj         = true
load-on-startup   = false
stop-timeout      = 10

; ----------------------------------------------------------------------
; BGE Reranker v2 M3 (multilingual reranker, 100+ languages).
; CPU only (n-gpu-layers = 0) — 0 VRAM use, coexists with any LLM.
; ~700MB RAM. Always loaded for RAG. Routes /v1/rerank here.
; ----------------------------------------------------------------------
[bge-reranker-v2-m3]
hf                = gpustack/bge-reranker-v2-m3-GGUF:Q8_0
n-gpu-layers      = 0
reranking         = true
pooling           = rank
ctx-size          = 4096
ub                = 2048
b                 = 2048
no-mmproj         = true
load-on-startup   = false
stop-timeout      = 10
